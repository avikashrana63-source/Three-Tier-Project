name: Docker Compose CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to the configured server using Docker Compose
        required: true
        default: false
        type: boolean

jobs:
  compose-test:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Compose stack
        run: docker compose build

      - name: Start Docker Compose stack
        run: docker compose up -d

      - name: Wait for application health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8085/api/health; then
              echo "Application is healthy"
              exit 0
            fi

            echo "Waiting for application health check... attempt ${attempt}/30"
            sleep 5
          done

          echo "Application did not become healthy in time"
          docker compose ps
          docker compose logs
          exit 1

      - name: Smoke test frontend
        run: curl --fail --silent --show-error http://localhost:8085/

      - name: Smoke test menu API
        run: curl --fail --silent --show-error http://localhost:8085/api/menu

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose down --volumes --remove-orphans

  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    needs: compose-test
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy stack
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          test -n "$SSH_USER"
          test -n "$APP_DIR"
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "
            set -e
            cd '$APP_DIR'
            git pull
            docker compose down --remove-orphans
            docker compose up -d --build
            docker compose ps
          "
