name: Docker Compose CI/CD

on:
push:
branches:
- main

pull_request:

workflow_dispatch:
inputs:
deploy:
description: Deploy to EC2 using Docker Compose
required: true
default: false
type: boolean

jobs:
compose-test:
name: Build and Smoke Test
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Build Docker Compose stack
    run: docker compose build

  - name: Start Docker Compose stack
    run: docker compose up -d

  - name: Wait for backend health
    run: |
      for attempt in {1..30}; do
        if curl --fail --silent http://localhost:3000/api/health; then
          echo "Backend is healthy"
          exit 0
        fi

        echo "Waiting for backend... attempt ${attempt}/30"
        sleep 5
      done

      docker compose ps
      docker compose logs
      exit 1

  - name: Smoke test frontend
    run: curl --fail --silent --show-error http://localhost:8085/

  - name: Show logs on failure
    if: failure()
    run: docker compose logs

  - name: Stop Docker Compose stack
    if: always()
    run: docker compose down --volumes --remove-orphans
```

deploy-backend:
name: Deploy Backend and Database EC2
runs-on: ubuntu-latest
needs: compose-test
if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}

```
steps:
  - name: Configure SSH
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
    run: |
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
      chmod 600 ~/.ssh/deploy_key
      ssh-keyscan -H "$BACKEND_HOST" >> ~/.ssh/known_hosts

  - name: Deploy backend stack
    env:
      BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      APP_DIR: ${{ secrets.APP_DIR }}
    run: |
      ssh -i ~/.ssh/deploy_key "$SSH_USER@$BACKEND_HOST" "
        cd '$APP_DIR'
        git pull origin main
        docker compose -f docker-compose.backend.yml down --remove-orphans
        docker compose -f docker-compose.backend.yml up -d --build
        docker compose -f docker-compose.backend.yml ps
      "
```

deploy-frontend:
name: Deploy Frontend EC2
runs-on: ubuntu-latest
needs: deploy-backend
if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}

```
steps:
  - name: Configure SSH
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
    run: |
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
      chmod 600 ~/.ssh/deploy_key
      ssh-keyscan -H "$FRONTEND_HOST" >> ~/.ssh/known_hosts

  - name: Deploy frontend stack
    env:
      FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      APP_DIR: ${{ secrets.APP_DIR }}
    run: |
      ssh -i ~/.ssh/deploy_key "$SSH_USER@$FRONTEND_HOST" "
        cd '$APP_DIR'
        git pull origin main
        docker compose -f docker-compose.frontend.yml down --remove-orphans
        docker compose -f docker-compose.frontend.yml up -d --build
        docker compose -f docker-compose.frontend.yml ps
      "
```
