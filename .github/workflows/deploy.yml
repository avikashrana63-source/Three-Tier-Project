name: Docker Compose CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  compose-test:
    name: Build Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Build
        run: docker compose build

  deploy-backend:
    name: Deploy Backend and Database EC2
    runs-on: ubuntu-latest
    needs: compose-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$BACKEND_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Backend Stack
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$BACKEND_HOST" "
            set -e
            [ ! -d '$APP_DIR' ] && git clone https://github.com/avikashrana63-source/Three-Tier-Project.git '$APP_DIR'
            cd '$APP_DIR' && git pull origin main
            docker compose -f docker-compose.backend.yml down --remove-orphans || true
            docker compose -f docker-compose.backend.yml up -d --build
          "

  deploy-frontend:
    name: Deploy Frontend EC2
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$FRONTEND_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Frontend Stack
        env:
          FRONTEND_HOST: ${{ secrets.FRONTEND_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_DIR: ${{ secrets.APP_DIR }}
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$FRONTEND_HOST" "
            set -e
            [ ! -d '$APP_DIR' ] && git clone https://github.com/avikashrana63-source/Three-Tier-Project.git '$APP_DIR'
            cd '$APP_DIR' && git pull origin main
            docker compose -f docker-compose.frontend.yml down --remove-orphans || true
            docker compose -f docker-compose.frontend.yml up -d --build
          "