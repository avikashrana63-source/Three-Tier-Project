name: Docker Compose CI/CD

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compose-test:
    name: Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  deploy-backend:
    name: Deploy Backend EC2
    runs-on: ubuntu-latest
    needs: compose-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.BACKEND_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy Backend
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.BACKEND_HOST }}" "
            set -e
            [ ! -d '${{ secrets.APP_DIR }}' ] && git clone https://github.com/avikashrana63-source/Three-Tier-Project.git '${{ secrets.APP_DIR }}'
            cd '${{ secrets.APP_DIR }}' && git pull origin main
            
            # Agar docker compose tool fail hota hai toh seedhe fallback script run karega
            docker compose -f docker-compose.backend.yml up -d --build --remove-orphans || \
            docker-compose -f docker-compose.backend.yml up -d --build --remove-orphans
          "

  deploy-frontend:
    name: Deploy Frontend EC2
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.FRONTEND_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy Frontend
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.FRONTEND_HOST }}" "
            set -e
            [ ! -d '${{ secrets.APP_DIR }}' ] && git clone https://github.com/avikashrana63-source/Three-Tier-Project.git '${{ secrets.APP_DIR }}'
            cd '${{ secrets.APP_DIR }}' && git pull origin main
            
            # Naye aur purane dono docker structures ko scale karne ke liye
            docker compose -f docker-compose.frontend.yml up -d --build --remove-orphans || \
            docker-compose -f docker-compose.frontend.yml up -d --build --remove-orphans
          "